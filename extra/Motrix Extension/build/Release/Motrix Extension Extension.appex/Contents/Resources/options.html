<!DOCTYPE html>
<html>
<head>
  <title>Motrix Extension Options</title>
  <style>
    body {
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    input[type="text"] {
      width: 300px;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      background-color: #007bff;
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #0056b3;
    }
    #status {
      margin-top: 10px;
      color: green;
    }
  </style>
</head>
<body>
  <div class="form-group">
    <label for="rpcUrl">RPC URL:</label>
    <input type="text" id="rpcUrl" placeholder="http://127.0.0.1:16800/jsonrpc">
  </div>
  <div class="form-group">
    <label for="rpcSecret">RPC Secret:</label>
    <input type="text" id="rpcSecret" placeholder="RPC Secret (optional)">
  </div>
  <button id="save">Save</button>
  <div id="status"></div>
  <script src="options.js"></script>
</body>
</html>
