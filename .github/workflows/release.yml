name: Build/release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  release:
    runs-on: ${{ matrix.os }}

    # Platforms to build on/for
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js, NPM 和 Yarn
        uses: actions/setup-node@v6
        with:
          node-version: 20



      - name: Build Safari Extension (macOS only)
        if: matrix.os == 'macos-latest'
        run: |
          xcodebuild -project "extra/Motrix Extension/Motrix Extension.xcodeproj" -scheme "Motrix Extension" -configuration Release clean build CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=YES VALIDATE_PRODUCT=NO SYMROOT="$PWD/extra/Motrix Extension/build"
          mv "extra/Motrix Extension/build/Release/Motrix Extension.app" extra/MotrixExtension.app
          cd extra && zip -r MotrixExtension.zip MotrixExtension.app

      - name: Build/release Electron app
        uses: motrixapp/action-electron-builder@v2
        with:
          build_script_name: 'build:github'
          # GitHub token, automatically provided to the action
          # (No need to define this secret in the repo settings)
          github_token: ${{ secrets.github_token }}

          # macOS code signing certificate
          mac_certs: ${{ secrets.mac_certs }}
          mac_certs_password: ${{ secrets.mac_certs_password }}

          # If the commit is tagged with a version (e.g. "v1.0.0"),
          # release the app after building
          release: ${{ vars.skip_publish != 'true' }}
        env:
          # macOS notarization
          TEAM_ID: ${{ secrets.team_id }}
          APPLE_ID: ${{ secrets.apple_id }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.apple_app_specific_password }}
